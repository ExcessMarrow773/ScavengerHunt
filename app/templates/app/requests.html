{% extends "base.html" %}
{% block page_content %}
{% for item in requests %}
        <div class="request-card">
                <div class="request-card-label">{{ item.device }}</div>
                {{ item }}
                <small>{{ item.created_on }}</small>
        </div>
{% endfor %}
<br>
<hr>

<details>
        <summary>Raw Request Data</summary>
        <!-- Content that will be hidden by default goes here -->
        <p>{{requests}}</p>
</details>

{% endblock page_content %}
